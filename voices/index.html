<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Voices · 别人眼中的 Amber</title>
  <meta name="description" content="LinkedIn-style recommendations for Amber Huang — what managers and teammates actually said." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF9F7; --ink: #0F1419; --ink-soft: rgba(15,20,25,0.55); --ink-faint: rgba(15,20,25,0.30);
      --line: rgba(15,20,25,0.12); --line-soft: rgba(15,20,25,0.07);
      --violet: #5B21B6; --violet-soft: #EDE9FE;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; }
    body { overflow: hidden; }
    .wrap { height: 100vh; height: 100dvh; display: flex; flex-direction: column; max-width: 860px; margin: 0 auto; padding: 14px 22px 12px; }
    header.meta {
      flex: 0 0 auto; display: flex; align-items: baseline; justify-content: space-between;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft);
      padding-bottom: 10px; border-bottom: 1px solid var(--line-soft);
    }
    header.meta .brand { color: var(--ink); letter-spacing: 0.32em; font-weight: 500; }
    header.meta .sep { margin: 0 10px; color: var(--ink-faint); }

    .stage { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; position: relative; }
    .card {
      position: relative; background: #fff; border: 1px solid var(--line-soft); border-radius: 14px;
      box-shadow: 0 18px 44px -22px rgba(15,20,25,0.18);
      padding: clamp(16px, 3.4vh, 28px) clamp(18px, 3.4vw, 32px);
      max-height: 100%; overflow: hidden; display: flex; flex-direction: column;
    }
    .card::before {
      content: '\201C'; position: absolute; top: 2px; right: 18px;
      font-family: var(--serif); font-size: clamp(64px, 11vh, 96px); line-height: 1; color: var(--violet-soft);
      pointer-events: none;
    }
    .who { display: flex; gap: 14px; align-items: flex-start; flex: 0 0 auto; }
    .avatar {
      flex: 0 0 auto; width: clamp(40px, 7vh, 52px); height: clamp(40px, 7vh, 52px); border-radius: 50%;
      background: var(--violet-soft); color: var(--violet);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: clamp(14px, 2.4vh, 18px); letter-spacing: 0.02em;
    }
    .id .name { font-weight: 600; font-size: clamp(15px, 2.6vh, 18px); display: flex; align-items: center; gap: 6px; }
    .badge {
      display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
      color: var(--violet); border: 1px solid var(--violet); border-radius: 3px; padding: 1px 5px; text-transform: uppercase;
    }
    .id .head { color: var(--ink-soft); font-size: clamp(11px, 1.9vh, 13px); margin-top: 2px; line-height: 1.45; }
    .id .rel { color: var(--ink-faint); font-size: clamp(10px, 1.8vh, 12px); margin-top: 3px; }
    .body {
      flex: 1 1 auto; min-height: 0; overflow: auto; margin-top: clamp(10px, 2vh, 16px);
      font-size: clamp(13px, 2.3vh, 15.5px); line-height: 1.75; color: var(--ink); font-weight: 350;
    }
    .body p { margin: 0 0 0.7em; }
    .cta-card .body { color: var(--ink-soft); }
    .cta-card { border-style: dashed; border-color: rgba(91,33,182,0.35); background: rgba(237,233,254,0.25); box-shadow: none; }

    .nav { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 18px; padding-top: clamp(8px, 1.8vh, 14px); }
    .nav button {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      background: none; border: 1px solid var(--line); border-radius: 999px; padding: 5px 14px;
      color: var(--ink-soft); cursor: pointer; transition: all .18s;
    }
    .nav button:hover { border-color: var(--violet); color: var(--violet); }
    .pips { display: flex; gap: 7px; }
    .pip { width: 22px; height: 3px; border-radius: 2px; background: var(--line); cursor: pointer; transition: background .18s; }
    .pip.active { background: var(--violet); }
    footer.meta {
      flex: 0 0 auto; display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft);
      padding-top: 10px; border-top: 1px solid var(--line-soft); margin-top: 10px;
    }
    footer.meta a { color: var(--violet); text-decoration: none; }
    @media (max-height: 500px) { footer.meta { display: none; } }
    @media (max-height: 380px) { .id .head { display: none; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="meta">
      <div><span class="brand">Voices</span><span class="sep">·</span>别人眼中的 Amber</div>
      <div id="counter">1 / 3</div>
    </header>

    <div class="stage"><div id="cardHost"></div></div>

    <div class="nav">
      <button id="prev">‹ Prev</button>
      <div class="pips" id="pips"></div>
      <button id="next">Next ›</button>
    </div>

    <footer class="meta">
      <span>Real words · real people</span>
      <span><a href="https://amberhuang.world" target="_blank" rel="noopener">amberhuang.world</a></span>
    </footer>
  </div>

  <script>
    const RECS = [
      {
        initials: 'JM',
        name: 'Joshua Meza',
        badge: 'LinkedIn · 原文',
        head: 'Community Leader and Connector · Development, Media, Marketing & Branding Lead, San Diego',
        rel: 'September 24, 2022 · Joshua managed Amber directly（CBS 8 实习直属上级）',
        body: `<p>At CBS 8 in San Diego, we were so lucky to have Amber as our intern. She immediately earned the respect and friendship of our team with her strategic thinking and eagerness to jump right into any situation.</p><p>Amber single-handedly helped our department revamp our LinkedIn profile and she helped us retain and recruit viewers at our pop-up news room at the San Diego County Fair. She was a pleasure to be around and contributed so much to our mission. I hope she learned a lot from working with us, because I know that we learned a lot from her!</p>`
      },
      {
        initials: '新',
        name: '新月',
        badge: '工作评价 · 转述',
        head: 'bilibili · 内容签约团队（美食亲子）负责人',
        rel: '2026 · Amber 在 bilibili 的直属上级',
        body: `<p>具备 PMO 能力——跨中台、跨行业团队、跨达人的多方项目，推进和拉通做得很稳。</p><p>在达人签约业务上，体现出优秀的潜力达人挖掘能力：对高潜 UP 主判断准，转化路径清晰。</p>`
      },
      {
        initials: '+',
        name: '虚位以待',
        badge: '你来写',
        head: '我们共事过？这里给你留了位子。',
        rel: '',
        cta: true,
        body: `<p>欢迎给我一段"真话推荐"——不用客套，讲一件我们一起做成（或搞砸又救回来）的事就行。飞书 / 微信丢给我，我原文上墙。</p>`
      }
    ];

    const host = document.getElementById('cardHost');
    const pipsEl = document.getElementById('pips');
    const counter = document.getElementById('counter');
    let idx = 0;

    RECS.forEach((r, i) => {
      const p = document.createElement('div');
      p.className = 'pip'; p.addEventListener('click', () => show(i));
      pipsEl.appendChild(p);
    });

    function show(i) {
      idx = ((i % RECS.length) + RECS.length) % RECS.length;
      const r = RECS[idx];
      host.innerHTML = `
        <div class="card${r.cta ? ' cta-card' : ''}">
          <div class="who">
            <div class="avatar">${r.initials}</div>
            <div class="id">
              <div class="name">${r.name} <span class="badge">${r.badge}</span></div>
              <div class="head">${r.head}</div>
              ${r.rel ? `<div class="rel">${r.rel}</div>` : ''}
            </div>
          </div>
          <div class="body">${r.body}</div>
        </div>`;
      pipsEl.querySelectorAll('.pip').forEach((p, j) => p.classList.toggle('active', j === idx));
      counter.textContent = (idx + 1) + ' / ' + RECS.length;
    }
    document.getElementById('prev').addEventListener('click', () => show(idx - 1));
    document.getElementById('next').addEventListener('click', () => show(idx + 1));
    show(0);
  </script>
</body>
</html>
